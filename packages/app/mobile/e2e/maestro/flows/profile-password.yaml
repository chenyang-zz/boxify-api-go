appId: io.github.chenyangzz.cove.mobile
name: Profile and password lifecycle
tags:
  - ios
  - local-real-db
  - profile-password
---
- clearKeychain
- launchApp:
    clearState: true
- openLink: ${MAESTRO_EXPO_DEV_CLIENT_URL}
- tapOn:
    text: Continue
    optional: true
    label: Dismiss the Expo development-client first-run guide
- tapOn:
    text: Close
    optional: true
    label: Close the Expo development menu after its first-run guide
- assertVisible:
    id: auth-login-action

# Authenticate with the fixture's current password.
- tapOn:
    id: auth-login-input
- inputText: ${MAESTRO_E2E_USERNAME}
- tapOn:
    id: auth-password-input
- inputText: ${MAESTRO_E2E_OLD_PASSWORD}
- tapOn:
    id: auth-login-action
- tapOn:
    text: 以后
    optional: true
    label: Dismiss the iOS password-save prompt when it appears
- tapOn:
    text: Not Now
    optional: true
    label: Dismiss the English iOS password-save prompt when it appears
- assertNotVisible:
    id: auth-login-action

# Profile navigation is setup for the profile/password contract under test.
- openLink: cove-mobile://profile
- assertVisible:
    id: profile-display-name
- takeScreenshot: 01-profile-before-edit

# Persist nickname and email through the App UI.
- tapOn:
    id: profile-nickname-edit
- tapOn:
    id: profile-nickname-input
    point: 95%,50%
- eraseText: 100
- inputText: ${MAESTRO_E2E_NICKNAME}
- tapOn:
    id: profile-email-input
    point: 95%,50%
- eraseText: 100
- inputText: ${MAESTRO_E2E_EMAIL}
- tapOn:
    id: profile-save-action
- assertVisible:
    id: profile-display-name
    text: ${MAESTRO_E2E_NICKNAME}
- assertVisible:
    id: profile-email-edit
    text: .*${MAESTRO_E2E_EMAIL}.*
- takeScreenshot: 02-profile-updated

# Reject the wrong current password without closing the sheet.
- tapOn:
    id: profile-password-edit
- tapOn:
    id: password-old-input
- inputText: ${MAESTRO_E2E_WRONG_PASSWORD}
- tapOn:
    id: password-new-input
- inputText: ${MAESTRO_E2E_NEW_PASSWORD}
- tapOn:
    id: password-confirm-input
- inputText: ${MAESTRO_E2E_NEW_PASSWORD}
- tapOn:
    id: password-save-action
- assertVisible:
    id: password-form-error
    text: 原密码错误
- takeScreenshot: 03-wrong-password-rejected

# Retry with the real current password and persist the rotation.
- tapOn:
    id: password-old-input
    point: 95%,50%
- eraseText: 100
- inputText: ${MAESTRO_E2E_OLD_PASSWORD}
- tapOn:
    id: password-save-action
- assertNotVisible:
    id: password-save-action
- takeScreenshot: 04-password-changed

# Logout, prove the old password fails, then prove the new password succeeds.
- scrollUntilVisible:
    element:
      id: profile-logout-action
    direction: DOWN
- tapOn:
    id: profile-logout-action
- assertVisible:
    id: auth-login-action
- tapOn:
    id: auth-login-input
- inputText: ${MAESTRO_E2E_USERNAME}
- tapOn:
    id: auth-password-input
- inputText: ${MAESTRO_E2E_OLD_PASSWORD}
- tapOn:
    id: auth-login-action
- assertVisible:
    id: auth-form-error
    text: 邮箱或密码错误
- takeScreenshot: 05-old-password-rejected
- tapOn:
    id: auth-password-input
    point: 95%,50%
- eraseText: 100
- inputText: ${MAESTRO_E2E_NEW_PASSWORD}
- tapOn:
    id: auth-login-action
- tapOn:
    text: 以后
    optional: true
    label: Dismiss the iOS password-save prompt when it appears
- tapOn:
    text: Not Now
    optional: true
    label: Dismiss the English iOS password-save prompt when it appears
- assertNotVisible:
    id: auth-login-action
- openLink: cove-mobile://profile
- assertVisible:
    id: profile-display-name
    text: ${MAESTRO_E2E_NICKNAME}
- assertVisible:
    id: profile-email-edit
    text: .*${MAESTRO_E2E_EMAIL}.*
- takeScreenshot: 06-new-password-login-success
